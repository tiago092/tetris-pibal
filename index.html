<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris Pibal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a16;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: monospace;
    }
    canvas {
      display: block;
      image-rendering: auto;
      /* escala automática manteniendo aspect ratio */
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
    }
    #gameOverVideo { display: none; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <video id="gameOverVideo" src="assets/video/quepuedoeu.mp4" loop playsinline muted></video>
  <script src="js/config.js"></script>
  <script src="js/tetris.js"></script>
</body>
</html>
