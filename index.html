<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris Pibal</title>
  <link rel="icon" type="image/png" href="assets/img/tonywarrior.webp">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a16;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: monospace;
    }
    canvas {
      display: block;
      image-rendering: auto;
      /* escala automática manteniendo aspect ratio */
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
    }
    #gameOverVideo { display: none; }

    #mobile-controls {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px 20px;
      background: rgba(10,10,22,0.85);
      z-index: 20;
      user-select: none;
      -webkit-user-select: none;
    }
    #mobile-controls .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    #mobile-controls .row + .row { margin-top: 10px; }
    .mbtn {
      flex: 1;
      height: 58px;
      background: rgba(80,80,180,0.35);
      border: 2px solid rgba(160,160,255,0.4);
      border-radius: 12px;
      color: #ffffff;
      font-size: 24px;
      font-family: monospace;
      cursor: pointer;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .mbtn:active { background: rgba(120,120,255,0.55); border-color: rgba(200,200,255,0.8); }
    .mbtn.drop {
      background: rgba(180,60,60,0.35);
      border-color: rgba(255,120,120,0.5);
      font-size: 14px;
      letter-spacing: 1px;
    }
    .mbtn.drop:active { background: rgba(255,80,80,0.55); }

    @media (pointer: coarse) {
      #mobile-controls { display: block; }
      body { align-items: flex-start; padding-top: 8px; }
      canvas { max-height: calc(100vh - 160px); }
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <video id="gameOverVideo" src="assets/video/quepuedoeu.mp4" loop playsinline muted></video>

  <div id="mobile-controls">
    <div class="row">
      <button class="mbtn" id="btn-rotate">↑</button>
    </div>
    <div class="row">
      <button class="mbtn" id="btn-left">←</button>
      <button class="mbtn" id="btn-down">↓</button>
      <button class="mbtn" id="btn-right">→</button>
    </div>
    <div class="row">
      <button class="mbtn drop" id="btn-drop">DROP</button>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/constants.js"></script>
  <script src="js/leaderboard.js"></script>
  <script src="js/media.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/render.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
